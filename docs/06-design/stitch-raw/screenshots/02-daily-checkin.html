<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden">

</div>
</header>
<main class="flex-grow px-6 pt-12 pb-24 max-w-lg mx-auto w-full">

<section class="text-center mb-12">
<h2 class="font-headline font-bold text-[28px] text-[#2D2418] leading-tight tracking-tight mb-3">
                How did yesterday go?
            </h2>
<p class="text-on-surface-variant font-body text-lg">
                Be honest — all answers help you learn
            </p>
</section>
<!-- Widget Cards Grid -->
<div class="space-y-6">
<!-- SUGAR-FREE CARD -->
<button class="w-full text-left bg-surface-container-lowest rounded-xl min-h-[90px] flex items-center p-5 relative overflow-hidden transition-all duration-200 active:scale-[0.98] hover:bg-surface-container-low group glow-warm">
<div class="absolute left-0 top-0 bottom-0 w-[3px] bg-tertiary"></div>
<div class="flex items-center gap-5 w-full">
<div class="w-12 h-12 rounded-full bg-tertiary-container/10 flex items-center justify-center text-tertiary group-hover:bg-tertiary-container group-hover:text-on-tertiary transition-colors bg-tertiary/10 text-tertiary"><span class="material-symbols-outlined text-[24px]">check</span></div>
<div class="flex flex-col">
<span class="font-headline font-bold text-[18px] text-[#2D2418]">Sugar-free!</span>
<span class="text-on-surface-variant text-sm">I didn't have added sugar</span>
</div>
<span class="material-symbols-outlined ml-auto text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<!-- HAD SOME CARD -->
<button class="w-full text-left bg-surface-container-lowest rounded-xl min-h-[90px] flex items-center p-5 relative overflow-hidden transition-all duration-200 active:scale-[0.98] hover:bg-surface-container-low group glow-warm">
<div class="absolute left-0 top-0 bottom-0 w-[3px] bg-[#FEA932]"></div>
<div class="flex items-center gap-5 w-full">
<div class="w-12 h-12 rounded-full bg-secondary-container/10 flex items-center justify-center text-[#865300] group-hover:bg-secondary-container group-hover:text-on-secondary-container transition-colors bg-secondary-container/20 text-[#865300]"><span class="material-symbols-outlined text-[24px]">cookie</span></div>
<div class="flex flex-col">
<span class="font-headline font-bold text-[18px] text-[#2D2418]">Had a little</span>
<span class="text-on-surface-variant text-sm">Some sugar, but I'm aware of it</span>
</div>
<span class="material-symbols-outlined ml-auto text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<!-- RELAPSE CARD -->
<button class="w-full text-left bg-surface-container-lowest rounded-xl min-h-[90px] flex items-center p-5 relative overflow-hidden transition-all duration-200 active:scale-[0.98] hover:bg-surface-container-low group glow-warm">
<div class="absolute left-0 top-0 bottom-0 w-[3px] bg-primary"></div>
<div class="flex items-center gap-5 w-full">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary transition-colors bg-primary/10 text-primary"><span class="material-symbols-outlined text-[24px]">refresh</span></div>
<div class="flex flex-col">
<span class="font-headline font-bold text-[18px] text-[#2D2418]">Full relapse</span>
<span class="text-on-surface-variant text-sm">It's data, not failure</span>
</div>
<span class="material-symbols-outlined ml-auto text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>

<p class="text-center italic text-on-surface-variant/60 font-body text-sm mt-12">
