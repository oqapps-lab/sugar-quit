<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&amp;family=Manrope:wght@200;300;400;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "inverse-surface": "#0e0e0d",
                    "secondary-dim": "#5e4b72",
                    "background": "#fbf9f5",
                    "secondary-fixed-dim": "#e3cbfa",
                    "outline-variant": "#b2b2ad",
                    "on-tertiary": "#eafdfc",
                    "on-secondary-container": "#5c4a71",
                    "on-secondary-fixed": "#49385d",
                    "on-tertiary-fixed-variant": "#4b5b5b",
                    "tertiary-container": "#cfe0df",
                    "primary": "#a53c30",
                    "on-primary": "#fff7f6",
                    "error-container": "#f56965",
                    "tertiary-fixed-dim": "#c1d2d1",
                    "surface-container-highest": "#e3e3dd",
                    "on-surface": "#31332f",
                    "on-primary-fixed": "#570202",
                    "tertiary": "#526262",
                    "surface-variant": "#e3e3dd",
                    "secondary": "#6a577f",
                    "on-primary-fixed-variant": "#822219",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#66547b",
                    "primary-container": "#ffaca0",
                    "on-error-container": "#65000b",
                    "primary-fixed": "#ffaca0",
                    "surface-bright": "#fbf9f5",
                    "tertiary-fixed": "#cfe0df",
                    "on-background": "#31332f",
                    "tertiary-dim": "#465656",
                    "surface-container-low": "#f5f3ef",
                    "error-dim": "#70030f",
                    "surface-container-high": "#e9e8e3",
                    "on-tertiary-fixed": "#2f3f3e",
                    "secondary-fixed": "#efdbff",
                    "on-secondary": "#fff6ff",
                    "primary-dim": "#953025",
                    "primary-fixed-dim": "#ff9788",
                    "on-error": "#fff7f6",
                    "outline": "#7a7b76",
                    "surface-dim": "#dadad4",
                    "surface-tint": "#a53c30",
                    "on-primary-container": "#761911",
                    "on-surface-variant": "#5e605b",
                    "error": "#ac3434",
                    "inverse-primary": "#fd7d6c",
                    "secondary-container": "#efdbff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .breathing-glow {
            box-shadow: 0 0 80px rgba(165, 60, 48, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- TopAppBar - Suppressed text, keeping minimal brand presence as per JSON -->
<header class="flex justify-between items-center w-full px-8 py-6 z-40 full-width top-0 absolute bg-transparent">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-rose-900 dark:text-rose-200" data-icon="bubble_chart">bubble_chart</span>
<span class="font-['Plus_Jakarta_Sans'] font-light tracking-widest uppercase text-[10px] text-rose-900 dark:text-rose-200">The Exhale</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border border-on-surface/5">
<img alt="User profile" class="w-full h-full object-cover grayscale opacity-80" data-alt="Close up portrait of a calm woman with soft lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYV1K4P_FPvXQnAE4Q4v-qZwwARK7XhFPXSvFWmJo6_XNtt_f5saKUwFTRXtVN5Ez6U-UczZJyPUD0yVGUYMP8B4rn5UNgYDC8gjL3gEjbIpzT6vA7P6KJK0Ik0EeK_E5jC08nCXvDiNjwPdgwvJxIFfZiD_JMo20AloWGi6Sf3vccp1ZB1sK85NhXCAl8krYwmsnzkXSsbyzsjTTw69eJtdO6Xlcfb5wkC0b17T-88YxGYWx84JbLVU_0jtU33xBIuAIN2bBtt3c"/>
</div>
</header>
<!-- SOS INTERVENTION CANVAS -->
<main class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Atmospheric Background Gradients -->
<div class="absolute inset-0 bg-gradient-to-b from-primary/10 via-primary-dim/20 to-primary/30 z-0"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150vw] h-[150vw] rounded-full bg-primary/5 blur-[120px] z-0"></div>
<!-- The Content Layer -->
<div class="relative z-10 flex flex-col items-center text-center px-6 max-w-lg">
<!-- Immediate Relief Header -->
<div class="mb-16 space-y-4">
<h1 class="font-headline font-extrabold text-5xl md:text-7xl tracking-tighter text-on-primary-container">
                    Breathe with me
                </h1>
<p class="font-body text-lg font-light tracking-wide text-on-primary-container/70">
                    Release the tension. Focus only on this moment.
                </p>
</div>
<!-- The SOS Centerpiece (Breath Indicator) -->
<div class="relative flex items-center justify-center">
<!-- Large Outer Pulse Ring -->
<div class="absolute w-80 h-80 rounded-full bg-primary/10 scale-110 opacity-40"></div>
<!-- Middle Pulse Ring -->
<div class="absolute w-64 h-64 rounded-full bg-primary-fixed-dim opacity-30"></div>
<!-- Main SOS Active Button / Breath Anchor -->
<button class="relative w-48 h-48 rounded-full bg-primary flex items-center justify-center breathing-glow active:scale-95 transition-transform duration-700">
<div class="flex flex-col items-center text-on-primary">
<span class="material-symbols-outlined text-5xl mb-2" data-icon="air" style="font-variation-settings: 'wght' 300;">air</span>
<span class="font-label text-xs tracking-[0.2em] uppercase font-semibold">Inhale</span>
</div>
</button>
</div>
<!-- Focus Instructions -->
<div class="mt-24 space-y-12">
<div class="flex flex-col gap-8">
<div class="flex items-center gap-6 text-left p-6 bg-surface-container-lowest/40 backdrop-blur-xl rounded-xl">
<div class="w-12 h-12 flex-shrink-0 rounded-full bg-primary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="waves">waves</span>
</div>
<div>
<p class="font-headline font-bold text-sm text-on-primary-container">The Physical Anchor</p>
<p class="font-body text-xs text-on-surface-variant/80">Feel your feet firmly on the floor. Soften your shoulders.</p>
</div>
</div>
</div>
<!-- Dismiss / End Session -->
<button class="group flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-all">
<div class="w-12 h-12 rounded-full border border-on-surface/10 flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</div>
<span class="font-label text-[10px] tracking-widest uppercase">End Session</span>
</button>
</div>
</div>
<!-- Ambient Particle Accents (Visual Depth) -->
<div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 bg-secondary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute top-[10%] left-[-5%] w-64 h-64 bg-primary-container/10 rounded-full blur-[80px] pointer-events-none"></div>
</main>
<!-- Navigation suppressed for focused SOS state as per "Shell Visibility & Relevance" rule -->
<!-- The user is in a task-focused, high-stress journey. Standard nav would be a distraction. -->
</body></html>
