<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sugar Quit — legal</title>
<style>
  :root {
    --bg: #fbf9f5;
    --fg: #31332f;
    --muted: #5e605b;
    --accent: #a53c30;
    --line: rgba(49,51,47,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }
  .brand-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
  }
  .brand-name {
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.2px;
  }
  h1 {
    font-size: 36px;
    line-height: 1.15;
    letter-spacing: -1px;
    font-weight: 800;
    margin: 0 0 12px;
  }
  .lede {
    color: var(--muted);
    margin: 0 0 48px;
  }
  ul.links {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  ul.links li {
    border-top: 1px solid var(--line);
  }
  ul.links li:last-child {
    border-bottom: 1px solid var(--line);
  }
  ul.links a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    color: var(--fg);
    text-decoration: none;
    font-size: 18px;
  }
  ul.links a:hover {
    color: var(--accent);
  }
  ul.links a::after {
    content: "›";
    color: var(--muted);
    font-size: 24px;
  }
  footer {
    margin-top: 64px;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<main>
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Sugar Quit</span>
  </div>
  <h1>Legal &amp; privacy</h1>
  <p class="lede">A few quiet documents. We keep them short on purpose — you should be able to read each in under five minutes.</p>
  <ul class="links">
    <li><a href="./privacy/">Privacy Policy</a></li>
    <li><a href="./terms/">Terms of Service</a></li>
  </ul>
  <footer>
    <p>Questions: <a href="mailto:support@sugarquit.app" style="color:var(--accent);">support@sugarquit.app</a></p>
    <p>App: <a href="https://apps.apple.com/app/id6753259200" style="color:var(--accent);">App Store</a></p>
  </footer>
</main>
</body>
</html>
