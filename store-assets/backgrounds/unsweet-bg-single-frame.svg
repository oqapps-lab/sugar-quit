<?xml version="1.0" encoding="UTF-8"?>
<!--
  Unsweet — single-frame background (1320×2868)
  For use under each individual screenshot in Figma.
  Same palette as master canvas, but tuned for one frame.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 2868">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B2A4E" />
      <stop offset="40%"  stop-color="#2D4A6B" />
      <stop offset="80%"  stop-color="#5A8B9E" />
      <stop offset="100%" stop-color="#A8D5BA" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#A8D5BA" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#A8D5BA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="45%">
      <stop offset="0%"   stop-color="#7AB8C4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#7AB8C4" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1320" height="2868" fill="url(#primary)" />
  <ellipse cx="660" cy="900" rx="900" ry="800" fill="url(#glow)" />
  <ellipse cx="1100" cy="2100" rx="700" ry="900" fill="url(#glow2)" />
  <g opacity="0.12" stroke="#E8F4F8" stroke-width="2" fill="none">
    <circle cx="660" cy="1434" r="1100" />
    <circle cx="660" cy="1434" r="900" />
  </g>
</svg>
